<head>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

<script>
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert("LỖI CAMERA: Vui lòng chạy trên HTTPS để điện thoại cho phép mở camera!");
}

// 1. CẢM ỨNG 3D VÀ HÌNH ẢNH 2D
AFRAME.registerComponent('gesture-handler', {
schema: { enabled: { default: true }, rotationFactor: { default: 5 }, minScale: { default: 0.1 }, maxScale: { default: 8 } },
init: function () {
this.handleScale = this.handleScale.bind(this);
this.handleRotation = this.handleRotation.bind(this);
this.isVisible = false;
this.initialScale = this.el.object3D.scale.clone();
this.scaleFactor = 1;
// Bắt sự kiện theo thẻ mẹ để đảm bảo cảm ứng hoạt động chuẩn khi tải tĩnh
const targetEl = this.el.closest('[mindar-image-target]');
if (targetEl) {
    targetEl.addEventListener("targetFound", () => { this.isVisible = true; });
    targetEl.addEventListener("targetLost", () => { this.isVisible = false; });
}
},
update: function () {
this.el.sceneEl.addEventListener("onefingermove", this.handleRotation);
this.el.sceneEl.addEventListener("twofingermove", this.handleScale);
},
handleRotation: function (event) {
if (this.isVisible) {
this.el.object3D.rotation.y += event.detail.positionChange.x * this.data.rotationFactor;
}
},
handleScale: function (event) {
if (this.isVisible) {
this.scaleFactor *= (1 + event.detail.spreadChange / event.detail.startSpread);
this.scaleFactor = Math.min(Math.max(this.scaleFactor, this.data.minScale), this.data.maxScale);
this.el.object3D.scale.x = this.scaleFactor * this.initialScale.x;
this.el.object3D.scale.y = this.scaleFactor * this.initialScale.y;
this.el.object3D.scale.z = this.scaleFactor * this.initialScale.z;
}
}
});

AFRAME.registerComponent('gesture-detector', {
init: function () {
this.el.addEventListener('mousedown', (event) => { this.el.emit('rangeStart', event); });
this.el.addEventListener('mousemove', (event) => { this.el.emit('onefingermove', { positionChange: { x: event.movementX / 100, y: event.movementY / 100 } }); });
this.el.addEventListener('touchstart', (event) => {
if(event.touches.length === 2) {
this.startSpread = Math.hypot(event.touches[0].pageX - event.touches[1].pageX, event.touches[0].pageY - event.touches[1].pageY);
}
if(event.touches.length === 1) this.lastX = event.touches[0].clientX;
});
this.el.addEventListener('touchmove', (event) => {
if (event.touches.length === 1) {
const touch = event.touches[0];
const movementX = touch.clientX - (this.lastX || touch.clientX);
this.lastX = touch.clientX;
this.el.emit('onefingermove', { positionChange: { x: movementX / 100, y: 0 } });
}
if (event.touches.length === 2) {
const spread = Math.hypot(event.touches[0].pageX - event.touches[1].pageX, event.touches[0].pageY - event.touches[1].pageY);
const spreadChange = spread - this.startSpread;
this.el.emit('twofingermove', { spreadChange: spreadChange, startSpread: this.startSpread });
this.startSpread = spread;
}
});
}
});

// 2. TÁCH NỀN VIDEO
AFRAME.registerComponent('blue-chromakey', {
schema: {
src: {type: 'selector'},
color: {type: 'vec3', default: {x: 0.0, y: 1.0, z: 0.0}}, 
similarity: {default: 0.25, type: 'number'},
crop: {default: 0.02, type: 'number'}
},
init: function() {
const videoEl = this.data.src;
if (!videoEl) return;
this.videoEl = videoEl;
this.texture = new THREE.VideoTexture(videoEl);
this.texture.minFilter = THREE.LinearFilter;
this.texture.format = THREE.RGBAFormat;
this.material = new THREE.ShaderMaterial({
uniforms: {
map: { value: this.texture },
keyColor: { value: new THREE.Vector3(this.data.color.x, this.data.color.y, this.data.color.z) },
similarity: { value: this.data.similarity },
smoothness: { value: 0.08 },
cropMargin: { value: this.data.crop } 
},
vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 ); }`,
fragmentShader: `
uniform sampler2D map; uniform vec3 keyColor; uniform float similarity; uniform float smoothness; uniform float cropMargin; varying vec2 vUv;
void main() {
if (vUv.y < cropMargin || vUv.y > (1.0 - cropMargin) || vUv.x < cropMargin || vUv.x > (1.0 - cropMargin)) { gl_FragColor = vec4(0.0); return; }
vec4 texColor = texture2D(map, vUv);
float d = distance(texColor.rgb, keyColor);
float alpha = smoothstep(similarity, similarity + smoothness, d);
gl_FragColor = vec4(texColor.rgb, texColor.a * alpha);
}
`,
transparent: true, side: THREE.DoubleSide, depthTest: false
});
this.el.getObject3D('mesh').material = this.material;
},
tick: function() { 
let isVisible = this.el.object3D.visible;
let parentVisible = this.el.object3D.parent ? this.el.object3D.parent.visible : true;
if (!isVisible || !parentVisible) return; 

if (!this.videoEl || this.videoEl.paused || this.videoEl.readyState < 2) return;
if (this.texture) this.texture.needsUpdate = true; 
}
});
</script>

<script>
// --- LOGIC THANH TIẾN TRÌNH ---
const loadingContainer = document.getElementById('loading-container');
const startBtn = document.getElementById('start-btn');
const progressBar = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-percentage');
const sceneEl = document.querySelector('a-scene');

let loadProgress = 0;
let progressInterval = setInterval(() => {
    loadProgress += Math.floor(Math.random() * 8) + 2; 
    if (loadProgress >= 95) loadProgress = 95; // Giữ ở 95% chờ A-frame load xong
    progressBar.style.width = loadProgress + '%';
    progressText.innerText = loadProgress + '%';
}, 400);

function finishLoading() {
    clearInterval(progressInterval);
    progressBar.style.width = '100%';
    progressText.innerText = '100%';
    setTimeout(() => {
        loadingContainer.style.display = 'none';
        startBtn.style.display = 'block';
    }, 600);
}

if (sceneEl.hasLoaded) {
    finishLoading();
} else {
    sceneEl.addEventListener('loaded', finishLoading);
}

// --- LOGIC AR GỐC ---
const startScreen = document.getElementById('start-screen');
const infoBtn = document.getElementById('info-btn');
const audioBtn = document.getElementById('audio-btn');
const toggleVideoBtn = document.getElementById('toggle-video-btn');
const gameBtn = document.getElementById('game-btn');
const backBtn = document.getElementById('back-btn');
const infoModal = document.getElementById('info-modal');
const menuVanLang1 = document.getElementById('menu-vanlang1');
const menuVanLang14 = document.getElementById('menu-vanlang14');
const menuVanLang15 = document.getElementById('menu-vanlang15');
const weatherAlert = document.getElementById('weather-alert');
const customAlert = document.getElementById('custom-alert');

let activeIdx = -1; 
let isAudioPlaying = false;
let isVideoMode = true; 
let currentVideo = null; 
let activeSubMenu = '';

startBtn.addEventListener('click', () => {
    startScreen.style.display = 'none';
    const dummy = new Audio(); dummy.play().catch(()=>{});
});

function getVideoIdForTarget(idx) {
    if (idx === 1) return 'v-vanlang2';
    if (idx === 2) return 'v-vanlang3';
    if (idx === 5) return 'v-vanlang6';
    if (idx === 12) return 'v-vanlang13';
    return null;
}

function resetAll() {
    document.querySelectorAll('video[id^="v-"], audio[id^="a-"]').forEach(m => { 
        m.pause(); 
        m.currentTime = 0; 
        m.muted = false; 
    });
    
    infoBtn.style.display = 'none';
    audioBtn.style.display = 'none';
    toggleVideoBtn.style.display = 'none';
    gameBtn.style.display = 'none'; 
    backBtn.style.display = 'none';
    menuVanLang1.style.display = 'none';
    menuVanLang14.style.display = 'none';
    menuVanLang15.style.display = 'none';
    infoModal.style.display = 'none';
    weatherAlert.style.display = 'none';
    customAlert.style.display = 'none';
    
    ['plane-vuahung', 'plane-lachau', 'plane-lactuong', 'plane-bochinh'].forEach(id => { document.getElementById(id).setAttribute('visible', 'false'); });
    
    [1, 2, 5].forEach(idx => {
        const m = document.getElementById(`model-t${idx}`);
        const v = document.getElementById(`video-t${idx}`);
        if(m) m.setAttribute('visible', 'false');
        if(v) v.setAttribute('visible', 'true');
    });

    document.getElementById('img-14').setAttribute('visible', 'false');
    document.getElementById('img-14b').setAttribute('visible', 'false');
    document.getElementById('img-15').setAttribute('visible', 'false');
    document.getElementById('model-15b').setAttribute('visible', 'false');
    document.getElementById('model-15c').setAttribute('visible', 'false');

    isAudioPlaying = false;
    audioBtn.innerText = '🔊';
    isVideoMode = true;
    currentVideo = null;
    activeSubMenu = '';
}

function stopAllMedia() {
    if(currentVideo) { currentVideo.pause(); currentVideo = null; }
    document.querySelectorAll('audio[id^="a-"]').forEach(a => a.pause());
    ['v-vuahung', 'v-lachau', 'v-lactuong', 'v-bochinh'].forEach(id => {
        let v = document.getElementById(id);
        if(v) v.pause();
    });
}

for (let i = 0; i < 15; i++) {
    const entity = document.getElementById(`t${i}`);
    if (!entity) continue;

    entity.addEventListener('targetFound', () => {
        if (activeIdx !== i) { resetAll(); }
        activeIdx = i;
        infoBtn.style.display = 'flex';
        audioBtn.style.display = 'flex';
        
        currentAudioId = `a-vanlang${i + 1}`;
        currentInfoId = `ttvanlang${i + 1}`;

        if (i === 3) {
            gameBtn.style.display = 'flex';
        }

        if (i === 0) {
            menuVanLang1.style.display = 'flex';
        } else if (i === 1 || i === 2 || i === 5 || i === 12) {
            if (i !== 12) {
                toggleVideoBtn.style.display = 'flex';
                toggleVideoBtn.innerText = '🧊'; 
            }
            isVideoMode = true;
            
            let videoId = getVideoIdForTarget(i);
            currentVideo = document.getElementById(videoId);
            if (currentVideo) {
                currentVideo.muted = isAudioPlaying;
                try { currentVideo.currentTime = 0; } catch(e){}
                currentVideo.play().catch(()=>{});
            }
        } else if (i === 13) {
            menuVanLang14.style.display = 'flex';
            document.getElementById('img-14').setAttribute('visible', 'true');
        } else if (i === 14) {
            menuVanLang15.style.display = 'flex';
            document.getElementById('img-15').setAttribute('visible', 'true');
            currentAudioId = 'a-15a';
            currentInfoId = 'ttvanlang15a';
        }
    });

    entity.addEventListener('targetLost', () => {
        if (activeIdx === i) {
            resetAll();
            activeIdx = -1;
        }
    });
}

window.selectSubVideo = function(charName) {
    menuVanLang1.style.display = 'none';
    backBtn.style.display = 'block';

    ['plane-vuahung', 'plane-lachau', 'plane-lactuong', 'plane-bochinh'].forEach(id => {
        document.getElementById(id).setAttribute('visible', 'false');
    });

    const plane = document.getElementById(`plane-${charName}`);
    const vid = document.getElementById(`v-${charName}`);
    
    if(plane) plane.setAttribute('visible', 'true');
    if(vid) {
        currentVideo = vid;
        vid.muted = isAudioPlaying; 
        try { vid.currentTime = 0; } catch(e){}
        vid.play().catch(()=>{});
    }
}

// CHỨC NĂNG THẺ 14
window.showWeather = function() {
    weatherAlert.style.display = 'block';
    setTimeout(() => { weatherAlert.style.display = 'none'; }, 3000);
}

window.showMinerals = function() {
    menuVanLang14.style.display = 'none';
    backBtn.style.display = 'block';
    document.getElementById('img-14').setAttribute('visible', 'false');
    document.getElementById('img-14b').setAttribute('visible', 'true');
}

// CHỨC NĂNG THẺ 15
window.selectCulture = function(type) {
    menuVanLang15.style.display = 'none';
    backBtn.style.display = 'block';
    document.getElementById('img-15').setAttribute('visible', 'false');
    
    let currentAudio = document.getElementById(currentAudioId);
    if (currentAudio) currentAudio.pause();

    if (type === 'phungnguyen') {
        document.getElementById('model-15b').setAttribute('visible', 'true');
        currentAudioId = 'a-15b';
        currentInfoId = 'ttvanlang15b';
    } else {
        document.getElementById('model-15c').setAttribute('visible', 'true');
        currentAudioId = 'a-15c';
        currentInfoId = 'ttvanlang15c';
    }

    if (isAudioPlaying) {
        let newAudio = document.getElementById(currentAudioId);
        if (newAudio) newAudio.play().catch(()=>{});
    }
}

window.goBack = function() {
    backBtn.style.display = 'none';
    if (activeIdx === 0) {
        ['plane-vuahung', 'plane-lachau', 'plane-lactuong', 'plane-bochinh'].forEach(id => {
            document.getElementById(id).setAttribute('visible', 'false');
        });
        if(currentVideo) { currentVideo.pause(); currentVideo = null; }
        menuVanLang1.style.display = 'flex';
    } else if (activeIdx === 13) {
        document.getElementById('img-14b').setAttribute('visible', 'false');
        document.getElementById('img-14').setAttribute('visible', 'true');
        menuVanLang14.style.display = 'flex';
    } else if (activeIdx === 14) {
        document.getElementById('model-15b').setAttribute('visible', 'false');
        document.getElementById('model-15c').setAttribute('visible', 'false');
        document.getElementById('img-15').setAttribute('visible', 'true');
        menuVanLang15.style.display = 'flex';
        
        let oldAudio = document.getElementById(currentAudioId);
        if (oldAudio) oldAudio.pause();
        
        currentAudioId = 'a-15a';
        currentInfoId = 'ttvanlang15a';
        if (isAudioPlaying) {
            let defaultAudio = document.getElementById(currentAudioId);
            if (defaultAudio) defaultAudio.play().catch(()=>{});
        }
    }
}

toggleVideoBtn.addEventListener('click', () => {
    if (activeIdx !== 1 && activeIdx !== 2 && activeIdx !== 5) return;
    
    isVideoMode = !isVideoMode;
    const model = document.getElementById(`model-t${activeIdx}`);
    const plane = document.getElementById(`video-t${activeIdx}`);
    let vidId = getVideoIdForTarget(activeIdx);
    const vid = document.getElementById(vidId);

    if (isVideoMode) {
        model.setAttribute('visible', 'false');
        plane.setAttribute('visible', 'true');
        toggleVideoBtn.innerText = '🧊'; 
        
        currentVideo = vid;
        if(vid) {
            vid.muted = isAudioPlaying;
            try { vid.currentTime = 0; } catch(e){}
            vid.play().catch(()=>{});
        }
    } else {
        plane.setAttribute('visible', 'false');
        model.setAttribute('visible', 'true');
        toggleVideoBtn.innerText = '🎬'; 
        
        if (vid) vid.pause();
        currentVideo = null;
    }
});

audioBtn.addEventListener('click', () => {
    if (activeIdx === -1) return;
    isAudioPlaying = !isAudioPlaying;
    audioBtn.innerText = isAudioPlaying ? '🎵' : '🔊';

    const audioFile = document.getElementById(currentAudioId);

    if (isAudioPlaying) {
        if (audioFile) audioFile.play().catch(()=>{});
        if (currentVideo) currentVideo.muted = true;
    } else {
        if (audioFile) audioFile.pause();
        if (currentVideo) currentVideo.muted = false;
    }
});

infoBtn.addEventListener('click', () => {
    if (activeIdx === -1) return;
    
    document.getElementById('info-content').src = `./${currentInfoId}.png`;
    infoModal.style.display = 'flex';
    
    if (currentVideo) currentVideo.pause();
    
    const audioFile = document.getElementById(currentAudioId);
    if (audioFile && isAudioPlaying) audioFile.pause();
});

infoModal.addEventListener('click', () => {
    infoModal.style.display = 'none';
    if (isAudioPlaying) {
        const audioFile = document.getElementById(currentAudioId);
        if(audioFile) audioFile.play().catch(()=>{});
    }
    if (currentVideo) {
        currentVideo.play().catch(()=>{});
    }
});

customAlert.addEventListener('click', () => {
    customAlert.style.display = 'none';
});

gameBtn.addEventListener('click', () => {
    stopAllMedia(); 
    window.open('https://nhom4detainghiencuukhoahoc.my.canva.site/mamcomngayxua', '_blank');
});
</script>
</body>
</html>
